<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Pagamento</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .formulario-pagamento {
      background: white;
      padding: 1.5rem;
      border-radius: 8px;
      margin-top: 2rem;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }

    .formulario-pagamento label {
      display: block;
      margin-top: 1rem;
      font-weight: bold;
    }

    .formulario-pagamento input {
      width: 100%;
      padding: 0.5rem;
      margin-top: 0.5rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 1rem;
    }

    .formulario-pagamento button {
      margin-top: 2rem;
      width: 100%;
      padding: 0.75rem;
      font-size: 1rem;
      background-color: #28a745;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .formulario-pagamento button:hover {
      background-color: #218838;
    }

    .sucesso {
      background-color: #d4edda;
      color: #155724;
      padding: 1rem;
      border-left: 5px solid #28a745;
      border-radius: 8px;
      margin-top: 2rem;
      text-align: center;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <header>
    <h1>💳 Pagamento</h1>
    <p>Finalize sua compra com segurança.</p>
  </header>

  <main id="pagamento-container"></main>

  <footer>
    <p>© 2025 Loja Proz</p>
  </footer>

  <script>
    const container = document.getElementById("pagamento-container");

    const urlParams = new URLSearchParams(window.location.search);
    const pedidoId = urlParams.get("pedidoId");

    const form = document.createElement("form");
    form.className = "formulario-pagamento";
    form.innerHTML = `
      <label for="numero">Número do Cartão</label>
      <input type="text" id="numero" required placeholder="0000 0000 0000 0000" maxlength="19">

      <label for="nome">Nome no Cartão</label>
      <input type="text" id="nome" required placeholder="Seu nome completo">

      <label for="validade">Validade</label>
      <input type="text" id="validade" required placeholder="MM/AA" maxlength="5">

      <label for="cvv">CVV</label>
      <input type="text" id="cvv" required placeholder="123" maxlength="3">

      <button type="submit">Finalizar Pagamento</button>
    `;

    form.addEventListener("submit", async function(event) {
      event.preventDefault();

      if (!pedidoId) {
        alert("ID do pedido não encontrado na URL.");
        return;
      }

      try {
        const response = await fetch("https://9sa19b2fve.execute-api.sa-east-1.amazonaws.com/dev/confirmar-pagamento", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            pedidoId: pedidoId,
            status: "pago"
          })
        });

        if (!response.ok) {
          const textoErro = await response.text(); // ou .json() se souber que a API retorna JSON
          console.error("Erro HTTP:", response.status);
          console.error("Detalhes da resposta:", textoErro);
          throw new Error("Erro ao confirmar pagamento");
        }

        container.innerHTML = `
          <div class="sucesso">
            ✅ Pagamento realizado com sucesso!<br>
            Obrigado pela sua compra.<br><br>
            ID do Pedido: <code>${pedidoId}</code>
          </div>
        `;

        localStorage.removeItem("produtosPedido");

        setTimeout(() => {
          window.location.href = "meus-pedidos.html";
        }, 3000);

      } catch (error) {
        alert("Falha ao confirmar pagamento. Tente novamente.");
        console.error("Erro:", error);
      }
    });

    container.appendChild(form);
  </script>
</body>
</html>
