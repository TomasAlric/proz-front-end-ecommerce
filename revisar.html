<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Revisar Pedido</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>📦 Revisar Pedido</h1>
      <p>Confira os produtos antes de finalizar seu pedido.</p>
    </header>

    <main id="resumo-pedido"></main>

    <button id="finalizar-pedido">Finalizar Pedido</button>

    <footer>
      <p>© 2025 Loja Proz</p>
    </footer>

    <script src="produtos.js"></script>
    <script>
      const urlParams = new URLSearchParams(window.location.search);
      let produtosSelecionados = [];

      if (urlParams.has("produtos")) {
        produtosSelecionados = urlParams
          .get("produtos")
          .split(",")
          .map(decodeURIComponent);
      } else {
        produtosSelecionados = urlParams
          .getAll("produto")
          .map(decodeURIComponent);
      }

      const normalizar = (str) =>
        str
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .toLowerCase();
      const container = document.getElementById("resumo-pedido");

      const encontrados = produtosDisponiveis.filter((p) =>
        produtosSelecionados.some(
          (selecionado) => normalizar(selecionado) === normalizar(p.nome)
        )
      );

      let total = 0;

      if (encontrados.length === 0) {
        container.innerHTML = "<p>Nenhum produto encontrado.</p>";
      } else {
        encontrados.forEach((prod) => {
          total += prod.preco;
          const div = document.createElement("div");
          div.className = "produto";
          div.innerHTML = `
          <img src="${prod.imagem}" alt="${prod.nome}" />
          <div>
            <h2>${prod.nome}</h2>
            <p>R$ ${prod.preco.toFixed(2)}</p>
          </div>
        `;
          container.appendChild(div);
        });

        const totalDiv = document.createElement("div");
        totalDiv.innerHTML = `<h3>Total: R$ ${total.toFixed(2)}</h3>`;
        container.appendChild(totalDiv);
      }

      document
        .getElementById("finalizar-pedido")
        .addEventListener("click", () => {
          fetch(
            "https://9sa19b2fve.execute-api.sa-east-1.amazonaws.com/dev/iniciar-pedido",
            {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                produtos: encontrados.map((p) => p.nome),
                total: total,
              }),
            }
          )
            .then((res) => res.json())
            .then((data) => {
              console.log("Resposta recebida da API:", data);

              let respostaFinal = data;
              if (typeof data.body === "string") {
                try {
                  respostaFinal = JSON.parse(data.body);
                } catch (e) {
                  console.error("Erro ao fazer parse do body:", e);
                }
              }

              const pedidoId = respostaFinal.pedidoId;

              if (pedidoId) {
                alert("Pedido iniciado com sucesso! ID: " + pedidoId);
                localStorage.setItem(
                  "produtosPedido",
                  JSON.stringify(encontrados)
                );
                localStorage.setItem("totalPedido", total.toFixed(2));
                window.location.href = "meus-pedidos.html?pedidoId=" + pedidoId;
              } else {
                alert("Pedido iniciado, mas o ID não foi retornado.");
              }
            })
            .catch((err) => {
              console.error("Erro ao iniciar pedido:", err);
              alert("Erro ao iniciar o pedido. Tente novamente.");
            });
        });
    </script>
  </body>
</html>
